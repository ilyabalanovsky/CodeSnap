name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            bundle_args: nsis
          - os: macos-14
            label: macos-arm64
            bundle_args: dmg
          - os: ubuntu-22.04
            label: linux-x64
            bundle_args: appimage deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Sync app version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run sync:version -- ${{ github.ref_name }}

      - name: Build desktop packages
        run: npm run tauri build -- --ci --bundles ${{ matrix.bundle_args }}

      - name: Collect Windows release assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null

          Copy-Item src-tauri/target/release/snapscript.exe release/SnapScript-windows-x64-portable.exe

          $setup = Get-ChildItem src-tauri/target/release/bundle/nsis -Filter *.exe | Select-Object -First 1
          if (-not $setup) {
            throw "NSIS setup executable was not found."
          }
          Copy-Item $setup.FullName release/SnapScript-windows-x64-setup.exe

      - name: Collect macOS release assets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release

          dmg="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' | head -n 1)"
          if [ -z "$dmg" ]; then
            echo "DMG file was not found." >&2
            exit 1
          fi
          cp "$dmg" release/SnapScript-macos-arm64.dmg

      - name: Collect Linux release assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release

          appimage="$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' | head -n 1)"
          if [ -z "$appimage" ]; then
            echo "AppImage file was not found." >&2
            exit 1
          fi
          cp "$appimage" release/SnapScript-linux-x64.AppImage
          chmod +x release/SnapScript-linux-x64.AppImage

          deb="$(find src-tauri/target/release/bundle/deb -maxdepth 1 -name '*.deb' | head -n 1)"
          if [ -z "$deb" ]; then
            echo "DEB file was not found." >&2
            exit 1
          fi
          cp "$deb" release/SnapScript-linux-x64.deb

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: snapscript-${{ matrix.label }}
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create checksums and release notes
        shell: bash
        run: |
          set -euo pipefail

          cd release-assets
          sha256sum SnapScript-* > SHA256SUMS.txt
          cd ..

          tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --sort=-version:refname | grep -v "^${tag}$" | head -n 1 || true)"

          {
            echo "## SnapScript ${tag}"
            echo
            echo "A lightweight desktop app for turning code into polished PNG screenshots."
            echo
            echo "### Downloads"
            echo
            echo "- **Windows:** \`SnapScript-windows-x64-setup.exe\` or \`SnapScript-windows-x64-portable.exe\`"
            echo "- **macOS Apple Silicon:** \`SnapScript-macos-arm64.dmg\`"
            echo "- **Linux:** \`SnapScript-linux-x64.AppImage\` or \`SnapScript-linux-x64.deb\`"
            echo
            echo "### Verify downloads"
            echo
            echo "Checksums are included in \`SHA256SUMS.txt\`."
            echo
            echo "### First launch note"
            echo
            echo "These builds are currently unsigned, so Windows SmartScreen or macOS Gatekeeper may warn on first launch. Download only from this GitHub release."
            echo
            if [ -n "$previous_tag" ]; then
              echo "### Full Changelog"
              echo
              echo "https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${tag}"
            else
              echo "### Full Changelog"
              echo
              echo "https://github.com/${GITHUB_REPOSITORY}/commits/${tag}"
            fi
          } > release-assets/RELEASE_NOTES.md

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-assets/RELEASE_NOTES.md
          files: |
            release-assets/SnapScript-*
            release-assets/SHA256SUMS.txt
